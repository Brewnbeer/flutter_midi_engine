group = 'com.midiengine.flutter_midi_engine'
version = '1.0-SNAPSHOT'

buildscript {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url = 'https://jitpack.io' }
    }
}

apply plugin: 'com.android.library'

// Built-in Kotlin migration (Flutter 3.44+).
// Android Gradle Plugin 9 ships Kotlin support built in. On AGP 8 and earlier the
// legacy Kotlin Gradle plugin must still be applied, so detect the AGP version and
// only apply 'kotlin-android' when running against AGP < 9. This keeps the plugin
// building on both AGP 8 and AGP 9 projects.
// See https://docs.flutter.dev/release/breaking-changes/migrate-to-built-in-kotlin
def agpMajor = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')[0] as int
if (agpMajor < 9) {
    apply plugin: 'kotlin-android'
}

android {
    namespace = 'com.midiengine.flutter_midi_engine'
    compileSdk = 36

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        minSdk = 24

        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    // FluidSynth-compatible MIDI driver for Android - supports SF2/SF3
    implementation 'com.github.billthefarmer:mididriver:1.25'
}
